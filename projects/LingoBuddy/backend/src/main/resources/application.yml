server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:lingobuddy
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  session:
    timeout: 7200

app:
  bootstrap:
    admin-password: admin123

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
