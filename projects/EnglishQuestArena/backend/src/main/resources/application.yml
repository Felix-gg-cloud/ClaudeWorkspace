spring:
  application:
    name: english-quest-arena

  # H2 文件数据库 (重启不丢数据)
  datasource:
    url: jdbc:h2:file:./data/eqa;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
      timeout: 7d
